<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Paneli | 11DB</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0a0a0a; color: white; }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        input, select {
            background: #161616;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: white;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }
        select option { background: #161616; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Yetki kontrol yükleyici -->
    <div id="auth-loading" class="text-center">
        <div class="w-10 h-10 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div>
        <p class="text-gray-500 text-sm tracking-widest uppercase">Yetki Kontrol Ediliyor...</p>
    </div>

    <!-- Admin paneli (auth geçildikten sonra gösterilir) -->
    <div id="admin-panel" class="hidden w-full max-w-lg glass-card rounded-[2.5rem] p-8 md:p-12">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold tracking-tighter mb-2">Admin<span class="text-blue-500">Panel</span></h1>
            <p class="text-gray-400 text-sm">Veritabanına yeni içerik ekleme yetkisi aktif.</p>
        </div>

        <!-- NOT: HTML <form> kullanmak yerine button ile submit işlemi yönetilmektedir. -->
        <div id="upload-form" class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1 mb-2">Deneme / Yayın Adı</label>
                <input type="text" id="title" placeholder="Örn: Bilgi Sarmal TYT-1"
                    class="w-full p-4 rounded-2xl transition-all">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1 mb-2">Branş</label>
                    <input type="text" id="subject" placeholder="Matematik"
                        class="w-full p-4 rounded-2xl transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1 mb-2">Sınav Tipi</label>
                    <select id="type" class="w-full p-4 rounded-2xl cursor-pointer transition-all">
                        <option value="Deneme">Deneme</option>
                        <option value="Tarama">Tarama</option>
                        <option value="Yazılı">Yazılı</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1 mb-2">Cevap Anahtarı Linki</label>
                <input type="url" id="answer_url" placeholder="https://resim-veya-pdf-linki.com"
                    class="w-full p-4 rounded-2xl transition-all text-sm">
            </div>

            <button id="submit-btn" onclick="handleSubmit()"
                class="w-full py-5 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl shadow-xl shadow-blue-900/20 transition-all active:scale-95">
                Veritabanına Kaydet
            </button>
        </div>

        <div id="status-msg" class="mt-6 text-center text-sm font-medium min-h-[1.25rem]"></div>

        <div class="mt-8 pt-6 border-t border-white/5 flex justify-between items-center">
            <button onclick="window.location.href='index.html'" class="text-[10px] text-gray-500 hover:text-white transition uppercase tracking-widest">Siteye Dön</button>
            <button onclick="signOut()" class="text-[10px] text-red-500/50 hover:text-red-500 transition uppercase tracking-widest font-bold">Çıkış Yap</button>
        </div>
    </div>

    <script>
        // --- KONFİGÜRASYON ---
        // HATA DÜZELTMESİ: 'supabase' isim çakışmasını önlemek için önce createClient ayrıştırıldı.
        const SUPABASE_URL = 'https://sadxpttfkzqiqlqccyix.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhZHhwdHRma3pxaXFscWNjeWl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNDE3NTksImV4cCI6MjA5MjYxNzc1OX0.rEKr4zdM_KCIdkdxakEppOiKDUKo2Jknkp_CYbMCPWE';
        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // ⚠️ BURAYI KENDİ MAİLİNLE DEĞİŞTİR!
        const ADMIN_EMAIL = 'hytaxgaming@gmail.com';

        // --- AUTH KONTROLÜ ---
        async function checkAdmin() {
            const { data: { user }, error } = await supabase.auth.getUser();

            if (error || !user) {
                window.location.href = 'login.html?to=admin.html';
                return;
            }

            if (user.email !== ADMIN_EMAIL) {
                alert('Yetkisiz Erişim! Sadece yönetici girebilir.');
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('auth-loading').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
        }

        // --- VERİ EKLEME ---
        const statusMsg = document.getElementById('status-msg');

        async function handleSubmit() {
            const title = document.getElementById('title').value.trim();
            const subject = document.getElementById('subject').value.trim();
            const answer_url = document.getElementById('answer_url').value.trim();

            // Basit doğrulama
            if (!title || !subject || !answer_url) {
                statusMsg.innerText = 'Lütfen tüm alanları doldurun.';
                statusMsg.className = 'mt-6 text-center text-sm font-medium text-yellow-500';
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = 'Gönderiliyor...';
            statusMsg.innerText = '';

            const payload = {
                title,
                subject,
                type: document.getElementById('type').value,
                answer_url,
                date: new Date().getFullYear().toString()
            };

            const { error } = await supabase.from('exams').insert([payload]);

            if (error) {
                statusMsg.innerText = 'Hata: ' + error.message;
                statusMsg.className = 'mt-6 text-center text-sm font-medium text-red-500';
            } else {
                statusMsg.innerText = '✓ Başarıyla Veritabanına Eklendi!';
                statusMsg.className = 'mt-6 text-center text-sm font-medium text-green-500';
                // Alanları temizle
                document.getElementById('title').value = '';
                document.getElementById('subject').value = '';
                document.getElementById('answer_url').value = '';
                document.getElementById('type').value = 'Deneme';
            }

            btn.disabled = false;
            btn.innerText = 'Veritabanına Kaydet';
        }

        async function signOut() {
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        }

        checkAdmin();
    </script>
</body>
</html>
